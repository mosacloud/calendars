name: Backend Workflow

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-back:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # Fail fast if the shared translations file is malformed. The backend
      # email/translation service json.load()s it at runtime, so a broken
      # file silently 500s every invitation / update / reply email. This is
      # the only place that consumes it server-side, so guard it here.
      - name: Validate translations.json is valid JSON
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "import json; json.load(open('src/frontend/src/features/i18n/translations.json')); print('translations.json is valid JSON')"
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "src/backend/pyproject.toml"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Check code formatting with ruff
        run: uv run ruff format . --diff
      - name: Lint code with ruff
        run: uv run ruff check .
      - name: Lint code with pylint
        run: uv run pylint .

  test-back:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: calendars
          POSTGRES_USER: pgroot
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DJANGO_CONFIGURATION: Test
      DJANGO_SETTINGS_MODULE: calendars.settings
      DJANGO_SECRET_KEY: ThisIsAnExampleKeyForTestPurposeOnly
      OIDC_OP_JWKS_ENDPOINT: /endpoint-for-test-purpose-only
      DJANGO_EMAIL_HOST: mailcatcher
      DB_HOST: localhost
      DB_NAME: calendars
      DB_USER: pgroot
      DB_PASSWORD: pass
      DB_PORT: 5432
      CALDAV_URL: http://localhost:80
      CALDAV_OUTBOUND_API_KEY: test-outbound-key
      CALDAV_INBOUND_API_KEY: test-inbound-key
      CALDAV_INTERNAL_API_KEY: test-internal-key
      TRANSLATIONS_JSON_PATH: ${{ github.workspace }}/src/frontend/src/features/i18n/translations.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create writable /data
        run: |
          sudo mkdir -p /data/media && \
          sudo mkdir -p /data/static

      - name: Build and start CalDAV server
        working-directory: .
        run: |
          docker build -t caldav-test src/caldav
          # Point SabreDAV at the dedicated caldav_test database. The
          # init script creates the DB if it doesn't exist yet.
          docker run -d --name caldav-test \
            --network host \
            -e PGHOST=localhost \
            -e PGPORT=5432 \
            -e PGDATABASE=caldav_test \
            -e PGUSER=pgroot \
            -e PGPASSWORD=pass \
            -e CALDAV_BASE_URI=/caldav/ \
            -e CALDAV_INBOUND_API_KEY=test-inbound-key \
            -e CALDAV_OUTBOUND_API_KEY=test-outbound-key \
            -e CALDAV_INTERNAL_API_KEY=test-internal-key \
            -e CALDAV_CALLBACK_BASE_URL=http://localhost:8001 \
            caldav-test \
            sh -c "/usr/local/bin/init-database.sh && apache2-foreground"

      - name: Wait for CalDAV to be ready
        run: |
          if ! timeout 30 bash -c 'until curl -s -o /dev/null http://localhost:80/; do sleep 1; done'; then
            echo "=== caldav-test container status ==="
            docker ps -a --filter name=caldav-test
            echo "=== caldav-test container logs ==="
            docker logs caldav-test || true
            exit 1
          fi
          echo "CalDAV server is ready"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "src/backend/pyproject.toml"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install the dependencies
        run: uv sync --locked --all-extras

      - name: Install MIME support
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc shared-mime-info media-types

      - name: Run tests
        run: uv run pytest -n 2
