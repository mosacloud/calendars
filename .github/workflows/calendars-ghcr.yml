name: Build and publish OCI images

"on":
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:

  docker-publish-backend:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    secrets: inherit
    with:
      image_name: "backend"
      context: "src/backend"
      target: backend-production
      # Supply the frontend-owned translations file (outside the src/backend
      # build context) as a named build context so the production stage can
      # COPY --from=i18n. Keeps prod calendar emails working.
      build_contexts: "i18n=src/frontend/src/features/i18n"

  docker-publish-frontend:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    secrets: inherit
    with:
      image_name: "frontend"
      context: "src/frontend"
      target: frontend-production
      arm64_reuse_amd64_build_arg: "FRONTEND_IMAGE"

  docker-publish-caldav:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    secrets: inherit
    with:
      image_name: "caldav"
      context: "src/caldav"
