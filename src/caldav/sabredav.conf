<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/sabredav
    
    <Directory /var/www/sabredav>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>
    
    # Rewrite rules for CalDAV
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ server.php [QSA,L]
    
    # Well-known CalDAV discovery
    RewriteRule ^\.well-known/caldav / [R=301,L]
    
    # Write errors to stderr for Docker logs
    ErrorLog /proc/self/fd/2

    # Access log to stdout for Docker logs, but exclude the liveness probe
    # — the healthcheck fires every 2s and would otherwise drown real
    # client traffic in the same stream. Anything else (including
    # unauthenticated CalDAV probes) is still logged for the audit trail.
    # Declaring our own CustomLog here also short-circuits Apache's
    # default ``other-vhosts-access-log.conf`` so we don't double-log.
    SetEnvIf Request_URI "^/caldav/healthz$" no_access_log
    CustomLog /proc/self/fd/1 vhost_combined env=!no_access_log
</VirtualHost>
